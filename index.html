<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <title>PixiJS - Template</title>
</head>

<body>
    <div id="app">
        <div>
            <div id="pixi-container"></div>
            <div id="controls">
                <div class="controls__item">
                    <button class="js-gravity-btn" data-value="decrease">-</button>
                    <button class="js-gravity-btn" data-value="increase">+</button>
                    <div class="js-gravity-value">Gravity: 2</div>

                </div>
                <div class="controls__item">
                    <button class="js-shapes-btn" data-value="decrease">-</button>
                    <button class="js-shapes-btn" data-value="increase">+</button>
                    <div class="js-shapes-value">Shapes per second: 2</div>
                </div>
                
            </div>
        </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
